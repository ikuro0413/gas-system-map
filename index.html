<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GASシステム全体相関図</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
h1 { text-align: center; font-size: 22px; margin-bottom: 8px; color: #f1f5f9; }
.subtitle { text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
.container { max-width: 1400px; margin: 0 auto; }

/* --- レイヤー --- */
.layer { margin-bottom: 16px; border-radius: 12px; padding: 16px; }
.layer-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.5px; }

.layer-external { background: rgba(100,116,139,0.15); border: 1px solid #475569; }
.layer-external .layer-title { color: #94a3b8; }

.layer-gas1 { background: rgba(59,130,246,0.08); border: 1px solid #1e40af; }
.layer-gas1 .layer-title { color: #60a5fa; }

.layer-gas2 { background: rgba(16,185,129,0.08); border: 1px solid #065f46; }
.layer-gas2 .layer-title { color: #34d399; }

.layer-gas3 { background: rgba(168,85,247,0.08); border: 1px solid #581c87; }
.layer-gas3 .layer-title { color: #a78bfa; }

/* --- スプシカード --- */
.ss-card { background: rgba(30,41,59,0.9); border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
.ss-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.ss-name { font-weight: 700; font-size: 14px; }
.ss-id { font-size: 10px; color: #64748b; font-family: monospace; }
.ss-link { font-size: 11px; color: #38bdf8; text-decoration: none; }
.ss-link:hover { text-decoration: underline; }
